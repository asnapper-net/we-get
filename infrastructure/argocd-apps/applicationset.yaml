apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agent-platform
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/asnapper-net/agent-platform.git
        revision: HEAD
        directories:
          - path: infrastructure/platform
          - path: infrastructure/mcp
          - path: infrastructure/runtime
  template:
    metadata:
      name: "agent-platform-{{path.basename}}"
    spec:
      project: agent-platform
      source:
        repoURL: https://github.com/asnapper-net/agent-platform.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
