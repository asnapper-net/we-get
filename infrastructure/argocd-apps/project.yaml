apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: agent-platform
  namespace: argocd
spec:
  description: Autonomous agent platform
  sourceRepos:
    - https://github.com/asnapper-net/agent-platform.git
  destinations:
    - namespace: agents-platform
      server: https://kubernetes.default.svc
    - namespace: agents-mcp
      server: https://kubernetes.default.svc
    - namespace: agents-runtime
      server: https://kubernetes.default.svc
    - namespace: agents-jobs
      server: https://kubernetes.default.svc
    - namespace: agents-services
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rabbitmq.com"
      kind: RabbitmqCluster
    - group: "postgresql.cnpg.io"
      kind: Cluster
  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: "apps"
      kind: StatefulSet
    - group: ""
      kind: Service
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "batch"
      kind: Job
