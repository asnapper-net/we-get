# MCP server Deployments — all stateless, namespace agents-mcp
# Each deployment exposes port 8080 and is reached by agents via internal DNS:
#   <name>-mcp.agents-mcp.svc:8080

apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp
  namespace: agents-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: github-mcp
  template:
    metadata:
      labels:
        app: github-mcp
    spec:
      serviceAccountName: mcp-github
      containers:
        - name: server
          image: ghcr.io/github/github-mcp-server:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: github-mcp-credentials
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp
  namespace: agents-mcp
spec:
  selector:
    app: github-mcp
  ports:
    - port: 8080
---
