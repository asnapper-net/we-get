apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: agents-postgres
  namespace: agents-platform
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised
  storage:
    size: 50Gi
    storageClass: standard
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
  bootstrap:
    initdb:
      database: agents_platform
      owner: agent
      secret:
        name: agents-postgres-credentials
