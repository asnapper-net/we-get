apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: agents-rabbitmq
  namespace: agents-platform
spec:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi
  persistence:
    storageClassName: standard
    storage: 20Gi
  rabbitmq:
    additionalConfig: |
      log.console.level = info
      channel_max = 1700
      default_user_tags.administrator = true
