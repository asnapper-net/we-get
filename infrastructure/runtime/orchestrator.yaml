apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agents-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: orchestrator
          image: ghcr.io/asnapper-net/agent-platform/orchestrator:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: database-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: rabbitmq-url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: anthropic-api-key
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: agents-runtime
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8000
